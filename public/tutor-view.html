<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Assessments</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <i class="fas fa-clipboard-list"></i> AssessPro
      </div>
      <nav class="sidebar-nav">
        <a href="form.html"><i class="fas fa-edit"></i> New Assessment</a>
        <a href="dashboard.html"><i class="fas fa-list"></i> Submissions</a>
        <a href="tutor-view.html" class="active"><i class="fas fa-user-graduate"></i> My Assessments</a>
        <a href="analytics.html"><i class="fas fa-chart-pie"></i> Analytics</a>
      </nav>
      <div class="sidebar-footer">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
      </div>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
        <span class="topbar-title">My Assessments</span>
        <div class="topbar-right"></div>
      </header>

      <div class="content-area">
        <div class="page-header">
          <h1>My Assessments</h1>
          <p>View all demo assessments you have submitted.</p>
        </div>

        <div class="dashboard-controls">
          <input type="text" id="searchInput" placeholder="Enter your name to see your assessments..." style="flex:1;max-width:400px">
          <button class="btn btn-primary" id="loadBtn"><i class="fas fa-search"></i> Load My Assessments</button>
          <span id="countBadge" style="font-size:0.85rem;color:var(--text-secondary);margin-left:auto">0 entries</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Slot</th>
                <th>Student Name</th>
                <th>Status</th>
                <th style="width:60px">Action</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
      <h2 id="modalTitle">Assessment Details</h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    let assessments = [];
    let currentId = null;

    function statusClass(s) {
      const map = {
        'New': 'New',
        'Contacted': 'Contacted',
        'CNR and Messaged': 'CNR',
        'Hot/Potential': 'Hot',
        'CNR 1': 'CNR',
        'CNR 2': 'CNR',
        'CNR 3': 'CNR',
        'Not Interested': 'Not',
        'Converted': 'Converted'
      };
      return map[s] || 'New';
    }

    function renderTable() {
      const search = document.getElementById('searchInput').value.toLowerCase();

      const filtered = assessments.filter(a => {
        return a.student_name.toLowerCase().includes(search) || a.slot.toLowerCase().includes(search);
      });

      document.getElementById('countBadge').textContent = filtered.length + ' entr' + (filtered.length === 1 ? 'y' : 'ies');

      const tbody = document.getElementById('tableBody');
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-secondary)">No assessments found</td></tr>';
        return;
      }
      tbody.innerHTML = filtered.map(a => `
        <tr data-id="${a.id}">
          <td>${a.date || new Date(a.created_at + 'Z').toLocaleDateString()}</td>
          <td>${a.time || ''}</td>
          <td>${a.slot}</td>
          <td><strong>${a.student_name}</strong></td>
          <td><span class="status-badge ${statusClass(a.status)}">${a.status}</span></td>
          <td><button class="btn btn-primary" style="padding:4px 12px;font-size:0.8rem" onclick="openModal(${a.id})">View</button></td>
        </tr>
      `).join('');
    }

    async function loadAssessments() {
      const name = document.getElementById('searchInput').value.trim();
      if (!name) {
        alert('Please enter your name to find your assessments.');
        return;
      }
      try {
        const res = await fetch('/api/assessments?tutor=' + encodeURIComponent(name));
        assessments = await res.json();
        renderTable();
      } catch (err) {
        console.error('Failed to load assessments', err);
      }
    }

    document.getElementById('loadBtn').addEventListener('click', loadAssessments);
    document.getElementById('searchInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loadAssessments();
    });
    document.getElementById('searchInput').addEventListener('input', renderTable);

    async function openModal(id) {
      currentId = id;
      try {
        const res = await fetch('/api/assessments/' + id);
        const a = await res.json();
        document.getElementById('modalTitle').textContent = a.student_name + ' — ' + a.slot;

        const body = document.getElementById('modalBody');
        body.innerHTML = `
          <div class="modal-field"><label>Tutor</label><div class="value">${a.tutor_name || '—'}</div></div>
          <div class="modal-field"><label>Phone</label><div class="value">${a.phone || '—'}</div></div>
          <div class="modal-field"><label>Demo Date</label><div class="value">${a.date || '—'}</div></div>
          <div class="modal-field"><label>Demo Time</label><div class="value">${a.time || '—'}</div></div>
          <div class="modal-field"><label>Student Age</label><div class="value">${a.student_age}</div></div>
          <div class="modal-field"><label>Language</label><div class="value">${a.language}</div></div>
          <div class="modal-field"><label>Level</label><div class="value"><span class="status-badge ${a.level}">${a.level}</span></div></div>
          ${a.topics_known.length ? `<div class="modal-field"><label>Topics Known</label><div class="topic-chips">${a.topics_known.map(t => `<span class="topic-chip">${t}</span>`).join('')}</div></div>` : ''}
          ${a.topics_covered.length ? `<div class="modal-field"><label>Topics Covered During Demo</label><div class="topic-chips">${a.topics_covered.map(t => `<span class="topic-chip">${t}</span>`).join('')}</div></div>` : ''}
          ${a.start_topic ? `<div class="modal-field"><label>Recommended Start Topic</label><div class="value">${a.start_topic}</div></div>` : ''}
          ${a.revision_topics.length ? `<div class="modal-field"><label>Topics Needing Revision</label><div class="topic-chips">${a.revision_topics.map(t => `<span class="topic-chip">${t}</span>`).join('')}</div></div>` : ''}
          <div class="modal-field"><label>Feedback</label><div class="value">${a.feedback}</div></div>
          <div class="modal-field"><label>Interest Level</label><div class="value">${'★'.repeat(a.interest_level)}${'☆'.repeat(5-a.interest_level)} (${a.interest_level}/5)</div></div>
          ${a.additional_remarks ? `<div class="modal-field"><label>Additional Remarks</label><div class="value">${a.additional_remarks}</div></div>` : ''}
          <div class="modal-field"><label>Submitted</label><div class="value">${new Date(a.created_at + 'Z').toLocaleString()}</div></div>
        `;
        document.getElementById('modal').classList.add('open');
      } catch (err) {
        console.error(err);
      }
    }

    document.getElementById('modalClose').addEventListener('click', () => {
      document.getElementById('modal').classList.remove('open');
    });

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        document.getElementById('modal').classList.remove('open');
      }
    });

    // Hamburger
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });
  </script>
</body>
</html>
