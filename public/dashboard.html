<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <i class="fas fa-clipboard-list"></i> AssessPro
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="active"><i class="fas fa-list"></i> Dashboard</a>
        <a href="analytics.html"><i class="fas fa-chart-pie"></i> Analytics</a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" id="logoutLink"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
        <span class="topbar-title">Dashboard</span>
        <div class="topbar-right">
          <span class="topbar-user" id="userName"></span>
        </div>
      </header>

      <div class="content-area">
        <div class="page-header">
          <h1>Demo Tracking</h1>
          <p>Google Sheet — Trial 2.0. Auto-refreshes every 30s. <span id="sheetSyncInfo"></span></p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Student Name</th>
                <th>Age</th>
                <th>Language</th>
                <th>Slot</th>
                <th>Demo Status</th>
                <th>Date</th>
                <th>Time</th>
                <th>Tutor</th>
                <th>Agent</th>
                <th>Phone</th>
              </tr>
            </thead>
            <tbody id="sheetTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Check auth
    (async () => {
      try {
        const res = await fetch('/api/me');
        const data = await res.json();
        if (!data.authenticated) {
          window.location.href = 'login.html';
          return;
        }
        document.getElementById('userName').textContent = data.name;
      } catch {
        window.location.href = 'login.html';
      }
    })();

    // Hamburger
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    // Logout
    document.getElementById('logoutLink').addEventListener('click', async (e) => {
      e.preventDefault();
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = 'index.html';
    });
        }
      } catch (err) {
        console.error(err);
      }
    });

    document.getElementById('deleteBtn').addEventListener('click', async () => {
      if (!currentId) return;
      if (!confirm('Delete this assessment? This cannot be undone.')) return;
      try {
        const res = await fetch('/api/assessments/' + currentId, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
          document.getElementById('modal').classList.remove('open');
          loadAssessments();
        }
      } catch (err) {
        console.error(err);
      }
    });

    document.getElementById('tableBody').addEventListener('click', async (e) => {
      const btn = e.target.closest('.delete-row');
      if (!btn) return;
      const id = parseInt(btn.dataset.id);
      if (!confirm('Delete this assessment? This cannot be undone.')) return;
      try {
        const res = await fetch('/api/assessments/' + id, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) loadAssessments();
      } catch (err) {
        console.error(err);
      }
    });

    // Hamburger
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    // Logout
    document.getElementById('logoutLink').addEventListener('click', async (e) => {
      e.preventDefault();
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = 'index.html';
    });

    loadAssessments();

    async function loadSheetData() {
      try {
        const res = await fetch('/api/sheet-data');
        const data = await res.json();
        document.getElementById('sheetSyncInfo').textContent = data.lastSync ? 'Last sync: ' + new Date(data.lastSync + 'Z').toLocaleTimeString() : '';
        const tbody = document.getElementById('sheetTableBody');
        if (!data.entries.length) {
          tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:20px;color:var(--text-secondary)">No sheet data found</td></tr>';
          return;
        }
        tbody.innerHTML = data.entries.map(e => `
          <tr>
            <td><strong>${e.student_name || '-'}</strong></td>
            <td>${e.age || '-'}</td>
            <td>${e.language || '-'}</td>
            <td>${e.slot || '-'}</td>
            <td><span class="status-badge ${e.demo_status.toLowerCase().includes('done') ? 'Converted' : 'New'}">${e.demo_status}</span></td>
            <td>${e.date || '-'}</td>
            <td>${e.time || '-'}</td>
            <td>${e.tutor_name || '-'}</td>
            <td>${e.agent_name || '-'}</td>
            <td>${e.phone || '-'}</td>
          </tr>
        `).join('');
      } catch (err) {
        console.error('Failed to load sheet data', err);
      }
    }

    loadSheetData();
    setInterval(loadSheetData, 30000);
  </script>
</body>
</html>
